<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoGuessr - Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.1);--text:#f0ede8;--text2:#9a9590;--accent:#d4a853;--accent2:#b8863a;--success:#4caf7d;--danger:#e05050;--radius:12px;--radius-sm:8px; }
body { background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh; }
header { display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2); }
.logo { font-size:18px;font-weight:700;letter-spacing:-0.03em; } .logo span { color:var(--accent); }
.live-badge { display:flex;align-items:center;gap:6px;font-size:12px;color:var(--success);font-weight:600; }
.live-dot { width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.admin-badge { font-size:11px;font-weight:700;background:rgba(212,168,83,0.15);color:var(--accent);border:1px solid rgba(212,168,83,0.3);border-radius:20px;padding:3px 10px; }
main { max-width:820px;margin:0 auto;padding:1.5rem 1rem 3rem; }
.photo-wrap { width:100%;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;border:1px solid var(--border);position:relative; }
.photo-wrap img { width:100%;height:100%;object-fit:cover;display:block; }
.photo-label { position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.65);color:#fff;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500; }
.card { background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem; }
.card-title { font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem; }
input[type="text"] { width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);font-size:15px; }
input[type="text"]:focus { outline:none;border-color:var(--accent); }
#map { height:340px;border-radius:var(--radius-sm);border:1px solid var(--border);margin:1rem 0; }
.guess-info { font-size:13px;color:var(--text2);padding:6px 10px;background:var(--bg3);border-radius:var(--radius-sm); }
.guess-info.has-guess { color:var(--accent);font-weight:500; }
.btn { display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:1rem; }
.btn:hover:not(:disabled) { background:var(--accent2); } .btn:disabled { opacity:0.35;cursor:not-allowed; }
.success-card { background:rgba(76,175,125,0.08);border:1px solid rgba(76,175,125,0.3);border-radius:var(--radius);padding:1.25rem;text-align:center;margin-bottom:1rem; }
.lb-row { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
.lb-row:last-child { border-bottom:none; }
.lb-rank { font-size:16px;width:28px;text-align:center; } .lb-name { flex:1;font-weight:500;font-size:14px; }
.you-badge { font-size:10px;background:rgba(212,168,83,0.15);color:var(--accent);border-radius:4px;padding:2px 6px;font-weight:600;margin-left:4px; }
.lb-coords { font-size:11px;color:var(--text2); }
.stat-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem; }
.stat { background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center; }
.stat-label { font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px; }
.stat-value { font-size:24px;font-weight:700; }
.ibtn { display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer; }
.btn-success { background:rgba(76,175,125,0.15);color:var(--success);border:1px solid rgba(76,175,125,0.3); }
.btn-success:hover { background:rgba(76,175,125,0.25); }
.btn-danger { background:rgba(224,80,80,0.15);color:var(--danger);border:1px solid rgba(224,80,80,0.3); }
.btn-danger:hover { background:rgba(224,80,80,0.25); }
.ibtn:disabled { opacity:0.35;cursor:not-allowed; } .btn-row { display:flex;gap:10px;flex-wrap:wrap; }
.revealed-banner { background:rgba(76,175,125,0.1);border:1px solid rgba(76,175,125,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--success);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:1rem; }
.photo-preview { width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:12px; }
.secret-block { background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;display:flex;gap:10px; }
#rmap { height:300px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:12px; }
.spinner { text-align:center;padding:2rem;color:var(--text2);font-size:14px; }
.sync { font-size:11px;color:var(--text2);text-align:right;margin-bottom:8px; }</style>
</head>
<body>
<header><div class="logo">Geo<span>Guess</span> <span style="font-size:13px;color:var(--text2);font-weight:400">- Admin</span></div><div class="admin-badge">ADMIN</div></header>
<main><div id="root"><div class="spinner">Chargement...</div></div></main>
<script>const BIN_ID='6a326329f5f4af5e29008476',API_KEY='$2a$10$317tD/oBXH4v6nzL8x8uMOU7zX.kW8Qz0h1ZycZgCrhiNmoAQ9HAC';
const SECRET={name:'Desert Atacama, Chili',lat:-23.1954,lng:-67.8908};
const PHOTO_URL='https://raw.githubusercontent.com/kevinsananes-sketch/geoguessr-pratice/main/vignette-atacama-729c420e.jpg';
const COLORS=['#d4a853','#4caf7d','#5b9bd5','#e05050','#a78bfa','#f97316','#06b6d4','#ec4899'];
function rank(i){return['🥇','🥈','🥉'][i]||(i+1)+'.'}
async function apiGet(){const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});const j=await r.json();return j.record}
async function apiPut(d){await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(d)})}
function initRmap(state){
  const el=document.getElementById('rmap');if(!el)return;
  const rm=L.map('rmap',{center:[SECRET.lat,SECRET.lng],zoom:3});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(rm);
  const ai=L.divIcon({html:'<div style="width:20px;height:20px;border-radius:50%;background:#e05050;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>',iconSize:[20,20],iconAnchor:[10,10],className:''});
  L.marker([SECRET.lat,SECRET.lng],{icon:ai}).addTo(rm).bindPopup('<strong>'+SECRET.name+'</strong>').openPopup();
  const s=[...state.guesses].sort((a,b)=>a.dist-b.dist);
  s.forEach((g,i)=>{const c=COLORS[i%COLORS.length];const pi=L.divIcon({html:'<div style="width:13px;height:13px;border-radius:50%;background:'+c+';border:2px solid white"></div>',iconSize:[13,13],iconAnchor:[6,6],className:''});L.marker([g.lat,g.lng],{icon:pi}).addTo(rm).bindPopup('<strong>'+g.name+'</strong><br>'+g.dist+' km - '+g.score+' pts');L.polyline([[SECRET.lat,SECRET.lng],[g.lat,g.lng]],{color:c,weight:1.5,dashArray:'5 4',opacity:.65}).addTo(rm);});
  const pts=[[SECRET.lat,SECRET.lng],...s.map(g=>[g.lat,g.lng])];
  if(pts.length>1)rm.fitBounds(pts,{padding:[30,30]});
}
let cur=null;
async function init(){cur=await apiGet();renderPage(cur);setInterval(async()=>{const s=await apiGet();if(JSON.stringify(s)!==JSON.stringify(cur)){cur=s;renderPage(s)}else{const el=document.getElementById('sync');if(el)el.textContent='Sync : '+new Date().toLocaleTimeString('fr-FR')}},3000)}
function renderPage(state){
  const sorted=[...state.guesses].sort((a,b)=>a.dist-b.dist);
  document.getElementById('root').innerHTML=
    (state.revealed?'<div class="revealed-banner">Resultats reveles aux joueurs</div>':'')+
    '<div class="sync" id="sync">Sync : '+new Date().toLocaleTimeString('fr-FR')+'</div>'+
    '<div class="card"><div class="card-title">Lieu secret</div>'+
    '<img src="'+PHOTO_URL+'" class="photo-preview" onerror="this.style.display='none'"/>'+
    '<div class="secret-block"><div><b>'+SECRET.name+'</b><br/><span style="color:var(--text2);font-size:12px">'+SECRET.lat+', '+SECRET.lng+'</span></div></div></div>'+
    '<div class="stat-grid">'+
    '<div class="stat"><div class="stat-label">Joueurs</div><div class="stat-value">'+state.guesses.length+'</div></div>'+
    '<div class="stat"><div class="stat-label">Meilleure dist.</div><div class="stat-value" style="font-size:20px">'+(sorted[0]?.dist??'-')+' km</div></div>'+
    '<div class="stat"><div class="stat-label">Meilleur score</div><div class="stat-value" style="color:var(--accent);font-size:20px">'+(sorted[0]?.score??'-')+'</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-title">Classement complet</div>'+
    (sorted.length===0?'<p style="font-size:13px;color:var(--text2)">Aucun joueur.</p>':
      sorted.map((g,i)=>'<div class="lb-row"><span class="lb-rank">'+rank(i)+'</span><div style="flex:1"><div class="lb-name">'+g.name+'</div><div class="lb-coords">'+g.lat.toFixed(3)+', '+g.lng.toFixed(3)+'</div></div><span style="color:var(--text2);font-size:13px;min-width:60px;text-align:right">'+g.dist+' km</span><span style="font-weight:700;color:var(--accent);font-size:13px;min-width:55px;text-align:right">'+g.score+' pts</span></div>').join(''))+
    '<div id="rmap"></div></div>'+
    '<div class="card"><div class="card-title">Actions</div><div class="btn-row">'+
    (!state.revealed?'<button class="ibtn btn-success" onclick="revealResults()">Reveler les resultats aux joueurs</button>':'<button class="ibtn btn-success" disabled>Resultats deja reveles</button>')+
    '<button class="ibtn btn-danger" onclick="resetGame()">Reset la partie</button></div>'+
    (!state.revealed?'<p style="font-size:12px;color:var(--text2);margin-top:10px">Les joueurs ne voient pas les distances avant revelation.</p>':'')+
    '</div>';
  setTimeout(()=>initRmap(state),100);
}
async function revealResults(){if(!confirm('Reveler les resultats ?'))return;cur.revealed=true;await apiPut(cur);renderPage(cur)}
async function resetGame(){if(!confirm('Remettre a zero ?'))return;cur={guesses:[],revealed:false};await apiPut(cur);renderPage(cur)}
init();
</script>
</body>
</html>
