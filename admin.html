<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoGuessr — Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
    --border: rgba(255,255,255,0.1); --text: #f0ede8; --text2: #9a9590;
    --accent: #d4a853; --accent2: #b8863a;
    --success: #4caf7d; --danger: #e05050;
    --radius: 12px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2);
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; }
  .logo span { color: var(--accent); }
  .admin-badge {
    font-size: 11px; font-weight: 700; background: rgba(212,168,83,0.15);
    color: var(--accent); border: 1px solid rgba(212,168,83,0.3);
    border-radius: 20px; padding: 3px 10px; letter-spacing: 0.08em;
  }
  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }

  .info-row { display: flex; gap: 8px; align-items: flex-start; padding: 10px 14px; background: var(--bg3); border-radius: var(--radius-sm); font-size: 13px; }
  .info-icon { font-size: 16px; margin-top: 1px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, background 0.2s;
  }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: rgba(224,80,80,0.15); color: var(--danger); border: 1px solid rgba(224,80,80,0.3); }
  .btn-danger:hover { background: rgba(224,80,80,0.25); }
  .btn-success { background: rgba(76,175,125,0.15); color: var(--success); border: 1px solid rgba(76,175,125,0.3); }
  .btn-success:hover { background: rgba(76,175,125,0.25); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 16px; width: 28px; text-align: center; }
  .lb-name { flex: 1; font-weight: 500; font-size: 14px; }
  .lb-dist { color: var(--text2); font-size: 13px; min-width: 60px; text-align: right; }
  .lb-score { font-weight: 700; color: var(--accent); font-size: 13px; min-width: 60px; text-align: right; }
  .lb-coords { font-size: 11px; color: var(--text2); }

  #rmap { height: 320px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-top: 12px; }

  .revealed-banner {
    background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--success); font-weight: 600;
    display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;
  }

  .photo-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--radius-sm); margin-bottom: 12px; }

  .secret-block {
    background: var(--bg3); border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 13px; display: flex; gap: 10px; align-items: center;
  }
  .secret-label { color: var(--text2); }
  .secret-value { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">Geo<span>Guess</span> <span style="font-size:13px;color:var(--text2);font-weight:400">— Vue admin</span></div>
  <div class="admin-badge">ADMIN</div>
</header>

<main>
  <div id="root"></div>
</main>

<script>
const STORAGE_KEY = 'geoguessr_game_v3';
const SECRET = {
  name: 'Hallgrímskirkja, Reykjavik — Islande',
  lat: 64.1418,
  lng: -21.9265
};
const GAME = {
  hint: 'Capitale d\'un pays nordique insulaire',
  photoUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Hallgrimskirkja_2012.jpg/1280px-Hallgrimskirkja_2012.jpg',
};
const COLORS = ['#d4a853','#4caf7d','#5b9bd5','#e05050','#a78bfa','#f97316','#06b6d4','#ec4899'];

function rank(i){ return ['🥇','🥈','🥉'][i]||(i+1)+'.'; }
function loadState(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); }catch{ return null; } }
function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function initState(){ return loadState() || { guesses:[], revealed:false }; }

let rmap = null;

function render() {
  const state = initState();
  const sorted = [...state.guesses].sort((a,b)=>a.dist-b.dist);
  const R = document.getElementById('root');

  R.innerHTML = `
    ${state.revealed ? `<div class="revealed-banner">✅ Résultats révélés aux joueurs</div>` : ''}

    <div class="card">
      <div class="card-title">🔐 Lieu secret</div>
      <img src="${GAME.photoUrl}" alt="Photo lieu" class="photo-preview" onerror="this.style.display='none'"/>
      <div class="secret-block">
        <div>📍</div>
        <div>
          <div class="secret-label">Lieu</div>
          <div class="secret-value">${SECRET.name}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${SECRET.lat}, ${SECRET.lng} · Indice : "${GAME.hint}"</div>
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Joueurs</div><div class="stat-value">${state.guesses.length}</div></div>
      <div class="stat"><div class="stat-label">Meilleure dist.</div><div class="stat-value" style="font-size:18px">${sorted[0]?.dist ?? '—'} km</div></div>
      <div class="stat"><div class="stat-label">Meilleur score</div><div class="stat-value" style="color:var(--accent);font-size:18px">${sorted[0]?.score ?? '—'}</div></div>
    </div>

    <div class="card">
      <div class="card-title">🏆 Classement complet</div>
      ${sorted.length===0 ? '<p style="font-size:13px;color:var(--text2)">Aucun joueur encore.</p>' : `
        <div>
          ${sorted.map((g,i)=>`
            <div class="lb-row">
              <span class="lb-rank">${rank(i)}</span>
              <div style="flex:1">
                <div class="lb-name">${g.name}</div>
                <div class="lb-coords">${g.lat.toFixed(3)}, ${g.lng.toFixed(3)}</div>
              </div>
              <span class="lb-dist">${g.dist} km</span>
              <span class="lb-score">${g.score} pts</span>
            </div>
          `).join('')}
        </div>
      `}
      <div id="rmap"></div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ Actions</div>
      <div class="btn-row">
        ${!state.revealed
          ? `<button class="btn btn-success" onclick="revealResults()">👁 Révéler les résultats aux joueurs</button>`
          : `<button class="btn btn-danger" style="opacity:0.5" disabled>✅ Déjà révélé</button>`
        }
        <button class="btn btn-danger" onclick="resetGame()">🗑 Reset la partie</button>
      </div>
      ${!state.revealed ? `<p style="font-size:12px;color:var(--text2);margin-top:10px">Les joueurs ne voient pas les distances tant que tu n'as pas révélé.</p>` : ''}
    </div>
  `;

  setTimeout(()=>initResultMap(state), 100);
}

function revealResults() {
  if(!confirm('Révéler les résultats à tous les joueurs ?')) return;
  const state = initState();
  state.revealed = true;
  saveState(state);
  render();
}

function resetGame() {
  if(!confirm('Remettre toute la partie à zéro ? Toutes les réponses seront supprimées.')) return;
  saveState({ guesses:[], revealed:false });
  render();
}

function initResultMap(state) {
  const el = document.getElementById('rmap');
  if(!el) return;
  if(rmap){ rmap.remove(); rmap=null; }
  if(state.guesses.length===0) { el.style.display='none'; return; }
  el.style.display='block';
  rmap = L.map('rmap',{center:[SECRET.lat,SECRET.lng],zoom:3});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(rmap);
  const aIcon = L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#e05050;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>`,iconSize:[20,20],iconAnchor:[10,10],className:''});
  L.marker([SECRET.lat,SECRET.lng],{icon:aIcon}).addTo(rmap).bindPopup(`<strong>📍 ${SECRET.name}</strong>`).openPopup();
  const sorted = [...state.guesses].sort((a,b)=>a.dist-b.dist);
  sorted.forEach((g,i)=>{
    const c=COLORS[i%COLORS.length];
    const pIcon=L.divIcon({html:`<div style="width:13px;height:13px;border-radius:50%;background:${c};border:2px solid white"></div>`,iconSize:[13,13],iconAnchor:[6,6],className:''});
    L.marker([g.lat,g.lng],{icon:pIcon}).addTo(rmap).bindPopup(`<strong>${g.name}</strong><br>${g.dist} km · ${g.score} pts`);
    L.polyline([[SECRET.lat,SECRET.lng],[g.lat,g.lng]],{color:c,weight:1.5,dashArray:'5 4',opacity:0.65}).addTo(rmap);
  });
  const pts=[[SECRET.lat,SECRET.lng],...sorted.map(g=>[g.lat,g.lng])];
  if(pts.length>1) rmap.fitBounds(pts,{padding:[30,30]});
}

// Poll for live updates
let lastHash = '';
function checkUpdates() {
  const h = JSON.stringify(loadState());
  if(h !== lastHash){ lastHash=h; render(); }
}
setInterval(checkUpdates, 2000);

render();
</script>
</body>
</html>
