<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoGuessr — Trouve le lieu !</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
    --border: rgba(255,255,255,0.1); --text: #f0ede8; --text2: #9a9590;
    --accent: #d4a853; --accent2: #b8863a; --success: #4caf7d; --danger: #e05050;
    --radius: 12px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; }
  .logo span { color: var(--accent); }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); font-weight: 600; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .photo-wrap { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; border: 1px solid var(--border); position: relative; }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.65); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }
  input[type="text"] { width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-size: 15px; transition: border-color 0.2s; }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  #map { height: 340px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin: 1rem 0; }
  .guess-info { font-size: 13px; color: var(--text2); min-height: 20px; padding: 6px 10px; background: var(--bg3); border-radius: var(--radius-sm); }
  .guess-info.has-guess { color: var(--accent); font-weight: 500; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
  .btn:hover:not(:disabled) { background: var(--accent2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .success-card { background: rgba(76,175,125,0.08); border: 1px solid rgba(76,175,125,0.3); border-radius: var(--radius); padding: 1.25rem; text-align: center; margin-bottom: 1rem; }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 16px; width: 24px; text-align: center; }
  .lb-name { flex: 1; font-weight: 500; font-size: 14px; }
  .you-badge { font-size: 10px; background: rgba(212,168,83,0.15); color: var(--accent); border-radius: 4px; padding: 2px 6px; font-weight: 600; margin-left: 4px; }
  #rmap { height: 300px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-top: 12px; }
  .spinner { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="logo">Geo<span>Guess</span></div>
  <div class="live-badge"><div class="live-dot"></div> Partie en cours</div>
</header>
<main><div id="root"><div class="spinner">Chargement…</div></div></main>
<script>
const BIN_ID = '6a326329f5f4af5e29008476';
const API_KEY = '$2a$10$317tD/oBXH4v6nzL8x8uMOU7zX.kW8Qz0h1ZycZgCrhiNmoAQ9HAC';
const SECRET = { name: "Désert d'Atacama, Chili", lat: -23.1954, lng: -67.8908 };
const PHOTO_URL = 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Atacama_Desert.jpg/1280px-Atacama_Desert.jpg';
const COLORS = ['#d4a853','#4caf7d','#5b9bd5','#e05050','#a78bfa','#f97316','#06b6d4','#ec4899'];

let map = null, marker = null, guessLatLng = null, currentState = null;

function dist(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));}
function score(d){return d<=1?5000:d>=5000?0:Math.round(5000*Math.exp(-d/500));}
function rank(i){return['🥇','🥈','🥉'][i]||(i+1)+'.';}
function getPlayer(){return localStorage.getItem('geo_player');}
function setPlayer(n){localStorage.setItem('geo_player',n);}

async function apiGet(){
  const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
  const j=await r.json(); return j.record;
}
async function apiPut(data){
  await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(data)});
}

async function init(){
  currentState=await apiGet();
  render(currentState);
  setInterval(async()=>{
    const s=await apiGet();
    if(JSON.stringify(s)!==JSON.stringify(currentState)){currentState=s;render(s);}
  },4000);
}

function render(state){
  const pname=getPlayer();
  const myGuess=pname&&state.guesses.find(g=>g.name===pname);
  if(myGuess) renderDone(state,myGuess);
  else renderPlay(state);
}

function renderPlay(state){
  document.getElementById('root').innerHTML=`
    <div class="photo-wrap"><img src="${PHOTO_URL}" alt="Trouve ce lieu !"/><div class="photo-label">📸 Où est-ce ?</div></div>
    <div class="card">
      <div class="card-title">Ton nom</div>
      <input type="text" id="pname" placeholder="Entre ton prénom ou pseudo" value="${getPlayer()||''}"/>
    </div>
    <div class="card">
      <div class="card-title">Clique sur la carte pour placer ta réponse</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:2px">Un seul clic autorisé — réfléchis bien !</p>
      <div id="map"></div>
      <div class="guess-info" id="ginfo">Aucune position choisie…</div>
      <button class="btn" id="sbtn" onclick="submitGuess()" disabled>✔ Confirmer ma réponse</button>
    </div>
    ${renderLB(state,false)}
  `;
  initMap();
}

function initMap(){
  if(map){map.remove();map=null;}
  const el=document.getElementById('map');
  if(!el)return;
  map=L.map('map',{center:[20,10],zoom:2});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  map.on('click',e=>{
    guessLatLng=e.latlng;
    if(marker)marker.remove();
    const icon=L.divIcon({html:'<div style="width:16px;height:16px;border-radius:50%;background:#d4a853;border:3px solid #0f0f0f;box-shadow:0 0 0 2px #d4a853"></div>',iconSize:[16,16],iconAnchor:[8,8],className:''});
    marker=L.marker(e.latlng,{icon}).addTo(map);
    const info=document.getElementById('ginfo');
    if(info){info.textContent='📍 '+e.latlng.lat.toFixed(3)+', '+e.latlng.lng.toFixed(3);info.classList.add('has-guess');}
    const btn=document.getElementById('sbtn');
    if(btn)btn.disabled=false;
  });
}

async function submitGuess(){
  const nameEl=document.getElementById('pname');
  const name=nameEl?nameEl.value.trim():'';
  if(!name){alert('Entre ton nom !');return;}
  if(!guessLatLng){alert('Clique d'abord sur la carte !');return;}
  const btn=document.getElementById('sbtn');
  if(btn){btn.disabled=true;btn.textContent='Envoi…';}
  const state=await apiGet();
  if(state.guesses.find(g=>g.name===name)){alert('Ce nom est déjà pris !');if(btn){btn.disabled=false;btn.textContent='✔ Confirmer ma réponse';}return;}
  setPlayer(name);
  const d=dist(SECRET.lat,SECRET.lng,guessLatLng.lat,guessLatLng.lng);
  const s=score(d);
  state.guesses.push({name,lat:guessLatLng.lat,lng:guessLatLng.lng,dist:d,score:s,ts:Date.now()});
  state.guesses.sort((a,b)=>a.dist-b.dist);
  await apiPut(state);
  currentState=state;
  renderDone(state,state.guesses.find(g=>g.name===name));
}

function renderDone(state,myGuess){
  document.getElementById('root').innerHTML=`
    <div class="success-card">
      <div style="font-size:36px;margin-bottom:8px">✅</div>
      <div style="font-size:18px;font-weight:700;color:var(--success)">Réponse enregistrée !</div>
      <div style="font-size:28px;font-weight:700;margin:8px 0 4px">${myGuess.dist} km</div>
      <div style="font-size:13px;color:var(--text2)">Score : <strong style="color:var(--accent)">${myGuess.score} / 5000</strong> · En attente de la révélation…</div>
    </div>
    ${renderLB(state,state.revealed)}
    ${state.revealed?'<div class="card"><div class="card-title">📍 Carte des réponses</div><div id="rmap"></div></div>':''}
  `;
  if(state.revealed)setTimeout(()=>initRmap(state),100);
}

function renderLB(state,showDist){
  const sorted=[...state.guesses].sort((a,b)=>a.dist-b.dist);
  const pname=getPlayer();
  if(sorted.length===0)return '';
  return `<div class="card">
    <div class="card-title">🏆 Classement — ${sorted.length} joueur${sorted.length>1?'s':''}</div>
    ${sorted.map((g,i)=>`<div class="lb-row">
      <span class="lb-rank">${rank(i)}</span>
      <span class="lb-name">${g.name}${g.name===pname?'<span class="you-badge">toi</span>':''}</span>
      ${showDist?`<span style="color:var(--text2);font-size:13px">${g.dist} km</span><span style="font-weight:700;color:var(--accent);font-size:13px">${g.score} pts</span>`:'<span style="font-size:11px;opacity:0.4">révélé bientôt</span>'}
    </div>`).join('')}
    ${!showDist?'<p style="font-size:12px;color:var(--text2);margin-top:10px;text-align:center">Les distances seront révélées par l'admin 🔒</p>':''}
  </div>`;
}

function initRmap(state){
  const el=document.getElementById('rmap');if(!el)return;
  const rmap=L.map('rmap',{center:[SECRET.lat,SECRET.lng],zoom:3});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(rmap);
  const aIcon=L.divIcon({html:'<div style="width:20px;height:20px;border-radius:50%;background:#e05050;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>',iconSize:[20,20],iconAnchor:[10,10],className:''});
  L.marker([SECRET.lat,SECRET.lng],{icon:aIcon}).addTo(rmap).bindPopup('<strong>📍 '+SECRET.name+'</strong>').openPopup();
  state.guesses.forEach((g,i)=>{
    const c=COLORS[i%COLORS.length];
    const pIcon=L.divIcon({html:'<div style="width:13px;height:13px;border-radius:50%;background:'+c+';border:2px solid white"></div>',iconSize:[13,13],iconAnchor:[6,6],className:''});
    L.marker([g.lat,g.lng],{icon:pIcon}).addTo(rmap).bindPopup('<strong>'+g.name+'</strong><br>'+g.dist+' km · '+g.score+' pts');
    L.polyline([[SECRET.lat,SECRET.lng],[g.lat,g.lng]],{color:c,weight:1.5,dashArray:'5 4',opacity:0.65}).addTo(rmap);
  });
  const pts=[[SECRET.lat,SECRET.lng],...state.guesses.map(g=>[g.lat,g.lng])];
  if(pts.length>1)rmap.fitBounds(pts,{padding:[30,30]});
}

init();
</script>
</body>
</html>
