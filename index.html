<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoGuessr — Trouve le lieu !</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.1);
    --text: #f0ede8;
    --text2: #9a9590;
    --accent: #d4a853;
    --accent2: #b8863a;
    --success: #4caf7d;
    --danger: #e05050;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
  .logo span { color: var(--accent); }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); font-weight: 600; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .hint-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1.25rem;
    font-size: 13px; color: var(--text2);
  }
  .hint-bar strong { color: var(--accent); }

  .photo-wrap {
    width: 100%; aspect-ratio: 16/9; border-radius: var(--radius);
    overflow: hidden; margin-bottom: 1.25rem;
    border: 1px solid var(--border); position: relative;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-label {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    color: #fff; font-size: 12px; padding: 4px 10px;
    border-radius: 20px; font-weight: 500;
  }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }

  input[type="text"] {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); font-size: 15px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }

  #map { height: 340px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin: 1rem 0; }

  .guess-info {
    font-size: 13px; color: var(--text2); min-height: 20px;
    padding: 6px 10px; background: var(--bg3); border-radius: var(--radius-sm);
  }
  .guess-info.has-guess { color: var(--accent); font-weight: 500; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px;
    background: var(--accent); color: #0f0f0f;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 1rem; transition: background 0.2s, opacity 0.2s;
  }
  .btn:hover:not(:disabled) { background: var(--accent2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .success-card {
    background: rgba(76,175,125,0.08); border: 1px solid rgba(76,175,125,0.3);
    border-radius: var(--radius); padding: 1.25rem; text-align: center;
  }
  .success-icon { font-size: 36px; margin-bottom: 8px; }
  .success-title { font-size: 18px; font-weight: 700; color: var(--success); }
  .success-dist { font-size: 28px; font-weight: 700; color: var(--text); margin: 8px 0 4px; }
  .success-sub { font-size: 13px; color: var(--text2); }

  .leaderboard { }
  .lb-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 16px; width: 24px; text-align: center; }
  .lb-name { flex: 1; font-weight: 500; }
  .lb-dist { color: var(--text2); font-size: 13px; }
  .lb-score { font-weight: 700; color: var(--accent); font-size: 13px; }
  .you-badge {
    font-size: 10px; background: rgba(212,168,83,0.15); color: var(--accent);
    border-radius: 4px; padding: 2px 6px; font-weight: 600; margin-left: 4px;
  }

  .locked {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--text2); font-size: 14px;
  }
  .locked-icon { font-size: 40px; margin-bottom: 12px; }

  .leaflet-container { background: #1a1a1a !important; }

  @media (max-width: 500px) {
    main { padding: 1rem 0.75rem 2rem; }
    #map { height: 260px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Geo<span>Guess</span></div>
  <div class="live-badge"><div class="live-dot"></div> Partie en cours</div>
</header>

<main>
  <div id="root"></div>
</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'geoguessr_game_v3';
const SECRET = {
  name: 'Hallgrímskirkja, Reykjavik — Islande',
  lat: 64.1418,
  lng: -21.9265
};
const GAME = {
  hint: 'Capitale d\'un pays nordique insulaire',
  photoUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Hallgrimskirkja_2012.jpg/1280px-Hallgrimskirkja_2012.jpg',
  photoCredit: 'Wikimedia Commons'
};
const COLORS = ['#d4a853','#4caf7d','#5b9bd5','#e05050','#a78bfa','#f97316','#06b6d4','#ec4899'];
// ─────────────────────────────────────────────────────────────────────────────

const R = document.getElementById('root');
let map = null, marker = null, guessLatLng = null;
let state = null;

function dist(lat1,lng1,lat2,lng2) {
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function score(d){ return d<=1?5000:d>=5000?0:Math.round(5000*Math.exp(-d/500)); }
function rank(i){ return ['🥇','🥈','🥉'][i]||(i+1)+'.'; }

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); } catch{ return null; }
}
function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function initState() {
  let s = loadState();
  if(!s) s = { guesses:[], revealed:false };
  return s;
}

function getPlayerName() { return localStorage.getItem('geo_player'); }
function setPlayerName(n) { localStorage.setItem('geo_player', n); }

function render() {
  state = initState();
  const playerName = getPlayerName();
  const myGuess = playerName && state.guesses.find(g=>g.name===playerName);

  if(myGuess) {
    renderDone(myGuess);
  } else {
    renderPlay();
  }
}

function renderPlay() {
  R.innerHTML = `
    <div class="hint-bar">🧭 <strong>Indice :</strong>&nbsp;${GAME.hint}</div>
    <div class="photo-wrap">
      <img src="${GAME.photoUrl}" alt="Photo du lieu à deviner" onerror="this.parentElement.style.display='none'"/>
      <div class="photo-label">📸 ${GAME.photoCredit}</div>
    </div>
    <div class="card">
      <div class="card-title">Ton nom</div>
      <input type="text" id="pname" placeholder="Entre ton prénom ou pseudo" value="${getPlayerName()||''}"/>
    </div>
    <div class="card">
      <div class="card-title">Clique sur la carte pour placer ta réponse</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:2px">Un seul clic autorisé — réfléchis bien avant de confirmer !</p>
      <div id="map"></div>
      <div class="guess-info" id="ginfo">Aucune position choisie…</div>
      <button class="btn" id="sbtn" onclick="submitGuess()" disabled>
        ✔ Confirmer ma réponse
      </button>
    </div>
    ${renderLeaderboard(false)}
  `;
  initMap();
}

function initMap() {
  if(map){ map.remove(); map=null; }
  map = L.map('map', { center:[20,10], zoom:2, zoomControl:true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  map.on('click', e=>{
    guessLatLng = e.latlng;
    if(marker) marker.remove();
    const icon = L.divIcon({
      html:`<div style="width:16px;height:16px;border-radius:50%;background:#d4a853;border:3px solid #0f0f0f;box-shadow:0 0 0 2px #d4a853"></div>`,
      iconSize:[16,16], iconAnchor:[8,8], className:''
    });
    marker = L.marker(e.latlng,{icon}).addTo(map);
    const info = document.getElementById('ginfo');
    if(info){ info.textContent=`📍 ${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)}`; info.classList.add('has-guess'); }
    const btn = document.getElementById('sbtn');
    if(btn) btn.disabled=false;
  });
}

function submitGuess() {
  const nameEl = document.getElementById('pname');
  const name = nameEl ? nameEl.value.trim() : '';
  if(!name){ alert('Entre ton nom !'); return; }
  if(!guessLatLng){ alert('Clique d\'abord sur la carte !'); return; }

  state = initState();
  if(state.guesses.find(g=>g.name===name)){ alert('Ce nom a déjà été utilisé, choisis-en un autre.'); return; }

  setPlayerName(name);
  const d = dist(SECRET.lat, SECRET.lng, guessLatLng.lat, guessLatLng.lng);
  const s = score(d);
  state.guesses.push({ name, lat:guessLatLng.lat, lng:guessLatLng.lng, dist:d, score:s, ts:Date.now() });
  state.guesses.sort((a,b)=>a.dist-b.dist);
  saveState(state);
  renderDone(state.guesses.find(g=>g.name===name));
}

function renderDone(myGuess) {
  state = initState();
  R.innerHTML = `
    <div class="success-card" style="margin-bottom:1rem">
      <div class="success-icon">✅</div>
      <div class="success-title">Réponse enregistrée !</div>
      <div class="success-dist">${myGuess.dist} km</div>
      <div class="success-sub">Score : <strong style="color:var(--accent)">${myGuess.score} / 5000</strong> · En attente de la révélation…</div>
    </div>
    ${renderLeaderboard(state.revealed)}
    ${state.revealed ? renderResultMap() : ''}
  `;
  if(state.revealed) setTimeout(()=>initResultMap(), 100);
}

function renderLeaderboard(showResult) {
  state = initState();
  const sorted = [...state.guesses].sort((a,b)=>a.dist-b.dist);
  const pname = getPlayerName();
  if(sorted.length===0) return '';

  return `
    <div class="card">
      <div class="card-title">🏆 Classement ${showResult?'final':'en cours'} — ${sorted.length} joueur${sorted.length>1?'s':''}</div>
      <div class="leaderboard">
        ${sorted.map((g,i)=>`
          <div class="lb-row">
            <span class="lb-rank">${rank(i)}</span>
            <span class="lb-name">${g.name}${g.name===pname?'<span class="you-badge">toi</span>':''}</span>
            ${showResult?`<span class="lb-dist">${g.dist} km</span><span class="lb-score">${g.score} pts</span>`:'<span class="lb-dist">—</span>'}
          </div>
        `).join('')}
      </div>
      ${!showResult?`<p style="font-size:12px;color:var(--text2);margin-top:12px;text-align:center">Les distances seront révélées par l'admin à la fin 🔒</p>`:''}
    </div>
  `;
}

function renderResultMap() {
  return `<div class="card"><div class="card-title">📍 Carte des réponses</div><div id="rmap" style="height:320px;border-radius:8px;border:1px solid var(--border)"></div></div>`;
}

function initResultMap() {
  state = initState();
  const el = document.getElementById('rmap');
  if(!el || !state.revealed) return;
  const rmap = L.map('rmap',{center:[SECRET.lat,SECRET.lng],zoom:3});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(rmap);
  const aIcon = L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#e05050;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>`,iconSize:[20,20],iconAnchor:[10,10],className:''});
  L.marker([SECRET.lat,SECRET.lng],{icon:aIcon}).addTo(rmap).bindPopup(`<strong>📍 ${SECRET.name}</strong>`).openPopup();
  state.guesses.forEach((g,i)=>{
    const c=COLORS[i%COLORS.length];
    const pIcon=L.divIcon({html:`<div style="width:13px;height:13px;border-radius:50%;background:${c};border:2px solid white"></div>`,iconSize:[13,13],iconAnchor:[6,6],className:''});
    L.marker([g.lat,g.lng],{icon:pIcon}).addTo(rmap).bindPopup(`<strong>${g.name}</strong><br>${g.dist} km · ${g.score} pts`);
    L.polyline([[SECRET.lat,SECRET.lng],[g.lat,g.lng]],{color:c,weight:1.5,dashArray:'5 4',opacity:0.65}).addTo(rmap);
  });
  const pts=[[SECRET.lat,SECRET.lng],...state.guesses.map(g=>[g.lat,g.lng])];
  if(pts.length>1) rmap.fitBounds(pts,{padding:[30,30]});
}

// Poll for updates (revealed by admin)
let lastHash = '';
function checkUpdates() {
  const s = loadState();
  const h = JSON.stringify(s);
  if(h !== lastHash) { lastHash=h; render(); }
}
setInterval(checkUpdates, 3000);

render();
</script>
</body>
</html>
